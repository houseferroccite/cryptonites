<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoNites — Профессиональный торговый журнал для macOS</title>

<!-- React 18 -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- GSAP + ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<!-- Lenis smooth scroll -->
<script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

<!-- Swiper -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<style>
/* ═══ RESET & BASE ══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7C6FFF;
  --accent2:#A78BFA;
  --profit:#00C96B;
  --loss:#FF3B5C;
  --warning:#F59E0B;
  --bg0:#0B0D11;
  --bg1:#111318;
  --bg2:#181B22;
  --bg3:#1E2230;
  --text:#F0F2F5;
  --text2:#9CA3AF;
  --border:rgba(255,255,255,0.07);
  --glow:rgba(124,111,255,0.35);
}
html{scroll-behavior:auto;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg0);color:var(--text);overflow-x:hidden;line-height:1.6}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* ═══ CANVAS ════════════════════════════════════════════════════ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
body::before{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* ═══ NAV ═══════════════════════════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 48px;
  backdrop-filter:blur(20px) saturate(180%);
  background:rgba(11,13,17,0.7);
  border-bottom:1px solid var(--border);
  transition:padding .3s,background .3s;
}
nav.scrolled{padding:11px 48px;background:rgba(11,13,17,0.92)}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:var(--text);text-decoration:none}
.nav-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 20px var(--glow);transition:transform .3s,box-shadow .3s}
.nav-logo:hover .nav-logo-icon{transform:rotate(-5deg) scale(1.1);box-shadow:0 0 36px var(--glow)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.23,1,.32,1)}
.nav-links a:hover{color:var(--text)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-cta{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 0 24px var(--glow)}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 0 40px var(--glow)}

/* ═══ TICKER ════════════════════════════════════════════════════ */
.ticker-wrap{position:relative;z-index:3;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg1);padding:13px 0}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:1}
.ticker-wrap::before{left:0;background:linear-gradient(90deg,var(--bg1),transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(-90deg,var(--bg1),transparent)}
.ticker-track{display:flex;width:max-content;animation:ticker 35s linear infinite}
.ticker-item{display:flex;align-items:center;gap:8px;padding:0 32px;font-size:13px;font-weight:600;white-space:nowrap}
.t-name{color:var(--text2)}
.t-price{color:var(--text)}
.t-change{font-size:12px}
.t-up{color:var(--profit)}
.t-down{color:var(--loss)}
.ticker-sep{color:var(--border)}

/* ═══ HERO ══════════════════════════════════════════════════════ */
#hero{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;overflow:hidden}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.3);border-radius:100px;padding:6px 16px;font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:32px;opacity:0;transform:translateY(20px);animation:fadeUp .8s .2s forwards}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--profit);animation:pulse 2s infinite;flex-shrink:0}
h1{font-size:clamp(42px,7vw,88px);font-weight:800;line-height:1.05;letter-spacing:-.03em;margin-bottom:24px;opacity:0;transform:translateY(30px);animation:fadeUp .9s .4s forwards}
.gradient-text{background:linear-gradient(135deg,#fff 30%,var(--accent2) 60%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.highlight{color:var(--profit);-webkit-text-fill-color:var(--profit)}
.hero-sub{font-size:clamp(16px,2.2vw,20px);color:var(--text2);max-width:620px;margin-bottom:48px;opacity:0;transform:translateY(20px);animation:fadeUp .9s .6s forwards;line-height:1.7}
.hero-buttons{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;opacity:0;transform:translateY(20px);animation:fadeUp .9s .8s forwards;margin-bottom:80px}
.btn-primary{display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px 32px;font-size:16px;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 0 40px var(--glow),0 4px 24px rgba(0,0,0,0.4);text-decoration:none;position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .3s}
.btn-primary:hover::before{opacity:1}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 60px var(--glow),0 8px 32px rgba(0,0,0,0.5)}
.btn-secondary{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);border-radius:14px;padding:16px 32px;font-size:16px;font-weight:600;cursor:pointer;transition:all .25s;text-decoration:none;backdrop-filter:blur(10px)}
.btn-secondary:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px)}

/* ═══ MACOS MOCKUP ══════════════════════════════════════════════ */
.hero-mockup{position:relative;z-index:2;opacity:0;transform:translateY(40px) perspective(1000px) rotateX(8deg);animation:mockupIn 1.2s 1s cubic-bezier(0.22,1,0.36,1) forwards;width:100%;max-width:960px}
.mockup-window{background:var(--bg1);border:1px solid rgba(255,255,255,0.1);border-radius:20px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,0.8),0 0 80px rgba(124,111,255,0.15)}
.mockup-titlebar{display:flex;align-items:center;gap:8px;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.dot{width:12px;height:12px;border-radius:50%}
.dot-red{background:#FF5F57}
.dot-yellow{background:#FFBD2E}
.dot-green{background:#27C93F}
.mockup-title{flex:1;text-align:center;font-size:13px;color:var(--text2);font-weight:500}
.mockup-body{display:flex;height:460px}
.mockup-sidebar{width:196px;background:var(--bg2);border-right:1px solid var(--border);padding:14px 8px;display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:var(--text2);cursor:default;transition:all .2s}
.sidebar-item.active{background:rgba(124,111,255,0.15);color:var(--text)}
.sidebar-item.active .s-icon{color:var(--accent)}
.s-icon{font-size:14px;width:18px;text-align:center}
.sidebar-label{font-size:10px;color:var(--text2);padding:10px 12px 3px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.mockup-content{flex:1;padding:18px;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.stat-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;margin-bottom:5px;letter-spacing:.04em}
.stat-value{font-size:17px;font-weight:800}
.stat-value.green{color:var(--profit)}
.stat-value.red{color:var(--loss)}
.stat-value.purple{color:var(--accent2)}
.stat-sub{font-size:10px;color:var(--text2);margin-top:2px}
.trade-list-header{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.trade-rows{display:flex;flex-direction:column;gap:6px}
.trade-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px}
.trade-ticker{font-weight:700;width:52px;font-size:13px}
.trade-side{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.long{background:rgba(0,201,107,0.15);color:var(--profit)}
.short{background:rgba(255,59,92,0.15);color:var(--loss)}
.trade-date{color:var(--text2);flex:1;font-size:11px}
.trade-pnl{font-weight:700;white-space:nowrap}
.trade-pnl.pos{color:var(--profit)}
.trade-pnl.neg{color:var(--loss)}
.mini-chart{flex:1;display:flex;align-items:flex-end;gap:2px;height:38px;max-width:80px}
.bar{flex:1;border-radius:2px 2px 0 0;animation:barGrow 1s cubic-bezier(0.34,1.56,0.64,1) forwards;transform-origin:bottom}

/* ═══ STATS STRIP ═══════════════════════════════════════════════ */
.stats-strip{position:relative;z-index:2;display:flex;justify-content:center;flex-wrap:wrap;background:var(--bg1);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat-strip-item{text-align:center;padding:32px 52px;border-right:1px solid var(--border)}
.stat-strip-item:last-child{border-right:none}
.big-num{font-size:48px;font-weight:900;line-height:1;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.big-label{font-size:13px;color:var(--text2);margin-top:6px}

/* ═══ SECTION COMMON ════════════════════════════════════════════ */
section{position:relative;z-index:2;padding:100px 24px;max-width:1200px;margin:0 auto}
.section-eyebrow{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--accent2);text-transform:uppercase;margin-bottom:14px;display:block}
.section-title{font-size:clamp(28px,4vw,48px);font-weight:800;letter-spacing:-.03em;margin-bottom:16px;line-height:1.1}
.section-sub{font-size:17px;color:var(--text2);max-width:560px;margin-bottom:64px;line-height:1.7;margin-left:auto;margin-right:auto}

/* ─── Features header centered ─ */
#features .section-eyebrow,
#features .section-title,
#features .section-sub{text-align:center;margin-left:auto;margin-right:auto}

/* ═══ FEATURES ══════════════════════════════════════════════════ */
.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.feat-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;position:relative;overflow:hidden;transition:all .4s cubic-bezier(.23,1,.32,1);cursor:default;opacity:0;transform:translateY(40px)}
.feat-card.visible{animation:fadeUp .7s forwards}
.feat-card::before{content:'';position:absolute;inset:0;background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(124,111,255,0.08),transparent 60%);opacity:0;transition:opacity .4s}
.feat-card:hover::before{opacity:1}
.feat-card:hover{border-color:rgba(124,111,255,0.3);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.4),0 0 40px rgba(124,111,255,0.1)}
.feat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px;position:relative;z-index:1}
.feat-title{font-size:18px;font-weight:700;margin-bottom:10px;position:relative;z-index:1}
.feat-desc{font-size:14px;color:var(--text2);line-height:1.7;position:relative;z-index:1}
.feat-badge{display:inline-block;margin-top:14px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;position:relative;z-index:1}
.badge-new{background:rgba(0,201,107,0.15);color:var(--profit)}
.badge-unique{background:rgba(124,111,255,0.15);color:var(--accent2)}
.badge-macos{background:rgba(245,158,11,0.15);color:var(--warning)}

/* ═══ GALLERY ═══════════════════════════════════════════════════ */
.gallery-section{position:relative;z-index:2;padding:80px 0 100px;max-width:100%;margin:0}
.gallery-header{text-align:center;padding:0 24px;margin-bottom:52px}
.ss-wrap{position:relative;padding-bottom:60px}
.ss-swiper{overflow:hidden!important}
.ss-swiper .swiper-slide{width:min(74vw,900px);border-radius:20px;overflow:hidden;cursor:grab;background:var(--bg2);box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px var(--border);transition:transform .6s cubic-bezier(.23,1,.32,1),opacity .6s,box-shadow .6s;position:relative}
.ss-swiper .swiper-slide:active{cursor:grabbing}
.ss-swiper .swiper-slide-active{transform:scale(1)!important;box-shadow:0 32px 80px rgba(0,0,0,.65),0 0 0 1px rgba(124,111,255,.3),0 0 60px rgba(124,111,255,.12)!important}
.ss-swiper .swiper-slide:not(.swiper-slide-active){transform:scale(.9)!important;opacity:.38}
.slide-img{width:100%;display:block;height:clamp(260px,40vw,520px);object-fit:cover;object-position:top center}
.slide-caption{position:absolute;bottom:0;left:0;right:0;padding:52px 24px 20px;background:linear-gradient(0deg,rgba(11,13,17,.95) 0%,rgba(11,13,17,.5) 55%,transparent 100%);font-size:13px;font-weight:600;color:rgba(255,255,255,.9);pointer-events:none}
.ss-prev,.ss-next{position:absolute;top:calc(50% - 36px);z-index:10;width:48px;height:48px;background:rgba(13,16,23,.88);backdrop-filter:blur(16px);border-radius:50%;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;user-select:none}
.ss-prev{left:max(16px,calc(50% - min(37vw,452px) - 62px))}
.ss-next{right:max(16px,calc(50% - min(37vw,452px) - 62px))}
.ss-prev:hover,.ss-next:hover{background:rgba(124,111,255,.3);border-color:rgba(124,111,255,.5);transform:scale(1.1)}
.ss-pag{position:absolute!important;bottom:18px;left:0;right:0}
.ss-pag .swiper-pagination-bullet{background:rgba(240,242,245,.25)!important;opacity:1!important;width:6px!important;height:6px!important;transition:all .3s}
.ss-pag .swiper-pagination-bullet-active{background:var(--accent)!important;width:28px!important;border-radius:3px!important}

/* ═══ UNIQUE SECTION ════════════════════════════════════════════ */
.unique-section{position:relative;z-index:2;background:linear-gradient(135deg,rgba(124,111,255,0.06) 0%,rgba(0,201,107,0.03) 100%);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:100px 24px}
.unique-inner{max-width:1200px;margin:0 auto}
.unique-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.unique-list{display:flex;flex-direction:column;gap:24px}
.unique-item{display:flex;gap:16px;align-items:flex-start;opacity:0;transform:translateX(-30px);transition:all .6s cubic-bezier(.23,1,.32,1)}
.unique-item.visible{opacity:1;transform:translateX(0)}
.unique-num{width:36px;height:36px;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 20px var(--glow)}
.unique-text h4{font-size:16px;font-weight:700;margin-bottom:6px}
.unique-text p{font-size:14px;color:var(--text2);line-height:1.6}

/* ═══ AI WIDGET ═════════════════════════════════════════════════ */
.ai-vis{position:relative;background:var(--bg2);border:1px solid rgba(124,111,255,0.2);border-radius:24px;padding:32px;overflow:hidden}
.ai-vis::before{content:'';position:absolute;top:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,255,0.2),transparent 70%);animation:floatOrb 6s ease-in-out infinite;pointer-events:none}
.ai-header{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.08em;margin-bottom:16px}
.ai-messages{display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.ai-msg{padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.5;max-width:90%}
.ai-msg.user{background:rgba(124,111,255,0.15);border:1px solid rgba(124,111,255,0.2);color:var(--text);align-self:flex-end;border-bottom-right-radius:4px}
.ai-msg.bot{background:var(--bg3);border:1px solid var(--border);color:var(--text2);align-self:flex-start;border-bottom-left-radius:4px}
.ai-typing{display:flex;gap:4px;align-items:center;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;width:fit-content}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:typingDot 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.ai-actions{margin-top:16px;display:flex;gap:8px}
.ai-action-btn{border-radius:8px;padding:8px 14px;font-size:12px;border:1px solid}

/* ═══ COMPARISON ════════════════════════════════════════════════ */
.compare-section{position:relative;z-index:2;padding:100px 24px;max-width:100%;background:rgba(255,255,255,.01)}
.compare-inner{max-width:920px;margin:0 auto}
.compare-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-top:56px}
.compare-table th{padding:18px 24px;text-align:left;background:var(--bg2);font-size:13px;font-weight:700;border-bottom:1px solid var(--border)}
.compare-table th.our{color:var(--accent2)}
.compare-table td{padding:14px 24px;font-size:14px;border-bottom:1px solid var(--border);background:var(--bg1)}
.compare-table tr:last-child td{border-bottom:none}
.compare-table td:first-child{color:var(--text2)}
.check{color:var(--profit);font-weight:700}
.cross{color:var(--loss);opacity:.45}
.our-col{background:rgba(124,111,255,0.05)!important}

/* ═══ PRIVACY ═══════════════════════════════════════════════════ */
.privacy-section{position:relative;z-index:2;padding:100px 24px;background:linear-gradient(180deg,transparent,rgba(124,111,255,.04),transparent)}
.privacy-inner{max-width:1100px;margin:0 auto}
.privacy-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px}
.priv-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;text-align:center;opacity:0;transform:scale(0.9);transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.priv-card.visible{opacity:1;transform:scale(1)}
.priv-card:hover{transform:translateY(-6px) scale(1.02);border-color:rgba(124,111,255,.25)}
.priv-icon{font-size:36px;margin-bottom:14px;display:block;animation:floatOrb 4s ease-in-out infinite}
.priv-card:nth-child(2) .priv-icon{animation-delay:.5s}
.priv-card:nth-child(3) .priv-icon{animation-delay:1s}
.priv-title{font-size:15px;font-weight:700;margin-bottom:8px}
.priv-desc{font-size:13px;color:var(--text2);line-height:1.6}

/* ═══ CTA ═══════════════════════════════════════════════════════ */
.cta-section{position:relative;z-index:2;overflow:hidden;padding:120px 24px;text-align:center}
.cta-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,255,0.15),transparent 70%);pointer-events:none;animation:breathe 4s ease-in-out infinite}
.cta-inner{position:relative;z-index:1;max-width:700px;margin:0 auto}
.cta-title{font-size:clamp(32px,5vw,62px);font-weight:900;letter-spacing:-.03em;margin-bottom:20px}
.cta-sub{font-size:18px;color:var(--text2);margin-bottom:48px;line-height:1.7}
.sys-req{margin-top:24px;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px}

/* ═══ FOOTER ════════════════════════════════════════════════════ */
footer{position:relative;z-index:2;border-top:1px solid var(--border);padding:40px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
.footer-links{display:flex;gap:24px}
.footer-links a{color:var(--text2);text-decoration:none;font-size:13px;transition:color .2s}
.footer-links a:hover{color:var(--text)}
.footer-copy{font-size:12px;color:var(--text2)}

/* ═══ KEYFRAMES ═════════════════════════════════════════════════ */
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes mockupIn{to{opacity:1;transform:translateY(0) perspective(1000px) rotateX(0deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes floatOrb{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.05)}}
@keyframes breathe{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}
@keyframes typingDot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}

/* ═══ SCROLL PROGRESS ═══════════════════════════════════════════ */
.scroll-progress{
  position:fixed;top:0;left:0;height:3px;z-index:300;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--profit));
  pointer-events:none;width:0%;
  box-shadow:0 0 8px var(--glow);
}

/* ═══ HAMBURGER / MOBILE MENU ════════════════════════════════════ */
.hamburger{
  display:none;flex-direction:column;gap:5px;
  cursor:pointer;padding:4px;background:none;border:none;
}
.hamburger span{
  display:block;width:22px;height:2px;
  background:var(--text);border-radius:2px;
  transition:all .35s cubic-bezier(.23,1,.32,1);
}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mob-menu{
  position:fixed;inset:0;
  background:rgba(11,13,17,.97);backdrop-filter:blur(24px);
  z-index:198;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:36px;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.mob-menu.open{opacity:1;pointer-events:all}
.mob-menu a{
  color:var(--text);font-size:26px;font-weight:700;
  text-decoration:none;opacity:0;transform:translateY(24px);
  transition:color .2s;
}
.mob-menu.open a{animation:fadeUp .4s forwards}
.mob-menu.open a:nth-child(1){animation-delay:.05s}
.mob-menu.open a:nth-child(2){animation-delay:.1s}
.mob-menu.open a:nth-child(3){animation-delay:.15s}
.mob-menu.open a:nth-child(4){animation-delay:.2s}
.mob-menu.open a:nth-child(5){animation-delay:.25s}
.mob-menu a:hover{color:var(--accent2)}

/* ═══ BACK TO TOP ════════════════════════════════════════════════ */
.back-top{
  position:fixed;bottom:32px;right:32px;z-index:150;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(20px);
  transition:opacity .3s,transform .3s,box-shadow .3s;
  box-shadow:0 0 24px var(--glow);
}
.back-top.show{opacity:1;transform:translateY(0)}
.back-top:hover{transform:translateY(-4px)!important;box-shadow:0 0 44px var(--glow)}

function formatPrice(price) {
  if (price >= 1000) return '$' + price.toLocaleString('en-US', {maximumFractionDigits:0});
  if (price >= 1)    return '$' + price.toLocaleString('en-US', {maximumFractionDigits:2});
  return '$' + price.toFixed(4);
}

async function fetchCoins() {
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${COIN_IDS}&order=market_cap_desc&sparkline=false&price_change_percentage=24h`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('CoinGecko error');
  const data = await res.json();
  return data.map(coin => {
    const ch = coin.price_change_percentage_24h || 0;
    return {
      n: COIN_LABELS[coin.id] || coin.symbol.toUpperCase(),
      p: formatPrice(coin.current_price),
      c: (ch >= 0 ? '+' : '') + ch.toFixed(2) + '%',
      up: ch >= 0,
    };
  });
}

/* ═══════════════════════════════════════════════════════════
   CANVAS 2D BACKGROUND
═══════════════════════════════════════════════════════════ */
function useParticleCanvas() {
  useEffect(() => {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let animId;
    let mX = window.innerWidth/2, mY = window.innerHeight/2;

    const resize = () => {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);
    document.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; });

    const orbData = [
      { x:0.15, y:0.30, r:180, color:'#7C6FFF', vx:0.28,  vy:0.18,  px:0   },
      { x:0.80, y:0.65, r:150, color:'#A78BFA', vx:-0.22, vy:0.25,  px:2.1 },
      { x:0.55, y:0.18, r:120, color:'#00C96B', vx:0.18,  vy:-0.22, px:4.3 },
      { x:0.35, y:0.82, r:100, color:'#FF3B5C', vx:-0.20, vy:-0.18, px:1.5 },
    ];
    const orbs = orbData.map(o => ({...o, cx:o.x*window.innerWidth, cy:o.y*window.innerHeight}));

    const NUM_PARTICLES = 80;
    const particles = Array.from({length:NUM_PARTICLES}, () => ({
      x:  Math.random() * window.innerWidth,
      y:  Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.55,
      vy: (Math.random() - 0.5) * 0.55,
      r:  Math.random() * 2 + 0.8,
      a:  Math.random() * 0.4 + 0.15,
      c:  Math.random() > 0.5 ? '124,111,255' : '167,139,250',
    }));

    let t = 0;
    const CONNECT_DIST = 130;

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      t += 0.005;

      // Orbs
      orbs.forEach(o => {
        o.cx += o.vx + Math.sin(t + o.px) * 0.3;
        o.cy += o.vy + Math.cos(t + o.px) * 0.25;
        if (o.cx < o.r)     { o.cx = o.r;   o.vx = Math.abs(o.vx); }
        if (o.cx > W - o.r) { o.cx = W-o.r; o.vx = -Math.abs(o.vx); }
        if (o.cy < o.r)     { o.cy = o.r;   o.vy = Math.abs(o.vy); }
        if (o.cy > H - o.r) { o.cy = H-o.r; o.vy = -Math.abs(o.vy); }

        const g = ctx.createRadialGradient(o.cx, o.cy, 0, o.cx, o.cy, o.r);
        const hex = o.color;
        g.addColorStop(0, hex + '28');
        g.addColorStop(0.5, hex + '10');
        g.addColorStop(1, hex + '00');
        ctx.beginPath();
        ctx.arc(o.cx, o.cy, o.r, 0, Math.PI*2);
        ctx.fillStyle = g;
        ctx.fill();
      });

      // Particles
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) { p.x = 0; p.vx *= -1; }
        if (p.x > W) { p.x = W; p.vx *= -1; }
        if (p.y < 0) { p.y = 0; p.vy *= -1; }
        if (p.y > H) { p.y = H; p.vy *= -1; }

        // Mouse repel
        const dx = p.x - mX, dy = p.y - mY;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 80) {
          p.vx += (dx/dist) * 0.06;
          p.vy += (dy/dist) * 0.06;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${p.c},${p.a})`;
        ctx.fill();
      });

      // Connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i+1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx*dx+dy*dy);
          if (d < CONNECT_DIST) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(124,111,255,${0.11*(1-d/CONNECT_DIST)})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      animId = requestAnimationFrame(draw);
    }
    draw();

    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
    };
  }, []);
}

/* ═══════════════════════════════════════════════════════════
   SCROLL PROGRESS
═══════════════════════════════════════════════════════════ */
function ScrollProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const doc = document.documentElement;
      const scrolled = doc.scrollTop || document.body.scrollTop;
      const total = doc.scrollHeight - doc.clientHeight;
      setPct(total > 0 ? (scrolled / total) * 100 : 0);
    };
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return <div className="scroll-progress" style={{width:`${pct}%`}}/>;
}

/* ═══════════════════════════════════════════════════════════
   BACK TO TOP
═══════════════════════════════════════════════════════════ */
function BackToTop() {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 500);
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const handleClick = () => {
    if (window.__lenis) window.__lenis.scrollTo(0, {duration:1.2});
    else window.scrollTo({top:0, behavior:'smooth'});
  };
  return (
    <button
      className={`back-top${show?' show':''}`}
      onClick={handleClick}
      aria-label="Наверх"
    >
      <svg width={18} height={18} fill="none" stroke="white" strokeWidth={2.5} viewBox="0 0 24 24">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
  );
}

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Lock body scroll when menu open
  useEffect(() => {
    document.body.style.overflow = menuOpen ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [menuOpen]);

  const go = (id) => {
    setMenuOpen(false);
    setTimeout(() => {
      const el = document.getElementById(id);
      if (!el) return;

function Ticker() {
  const [coins, setCoins] = React.useState(COINS_FALLBACK);

  React.useEffect(() => {
    let active = true;
    const load = async () => {
      try {
        const data = await fetchCoins();
        if (active && data.length) setCoins(data);
      } catch(e) { /* оставляем fallback */ }
    };
    load();
    const timer = setInterval(load, 30000);
    return () => { active = false; clearInterval(timer); };
  }, []);

  const doubled = [...coins, ...coins];
  return (
    <div className="ticker-wrap" style={{marginTop:'64px'}}>
      <div className="ticker-track">
        {doubled.map((c,i) => (

            <span className="ticker-sep">·</span>

        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   STATS STRIP
═══════════════════════════════════════════════════════════ */
function StatsStrip() {
  const items = [
    {val:30, suffix:'+', label:'Функций и инструментов', id:'s1'},
    {val:9,  suffix:'',  label:'AI-моделей на выбор',    id:'s2'},
    {val:4,  suffix:'',  label:'Форматов экспорта',      id:'s3'},
    {val:0,  suffix:'%', label:'Данных утекло в облако', id:'s4'},
  ];
  const refs = useRef([]);
  const [counts, setCounts] = useState(items.map(() => 0));
  const animated = useRef(false);

  useEffect(() => {
    const strip = document.querySelector('.stats-strip');
    if (!strip) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !animated.current) {
        animated.current = true;
        items.forEach((item, i) => {
          const start = performance.now();
          const dur = 1400;
          const step = (now) => {
            const p = Math.min((now - start) / dur, 1);
            const ease = 1 - Math.pow(1 - p, 3);
            setCounts(prev => {
              const next = [...prev];
              next[i] = Math.round(ease * item.val);
              return next;
            });
            if (p < 1) requestAnimationFrame(step);
          };
          setTimeout(() => requestAnimationFrame(step), i * 120);
        });
      }
    }, {threshold:0.5});
    obs.observe(strip);
    return () => obs.disconnect();
  }, []);

  return (
    <div className="stats-strip">
      {items.map((it, i) => (
        <div className="stat-strip-item" key={it.id}>
          <div className="big-num">{counts[i]}{it.suffix}</div>
          <div className="big-label">{it.label}</div>
        </div>
      ))}
    </div>
  );
}

  return (

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [content, setContent] = useState(CONTENT_DEFAULT);
  useParticleCanvas();

  // Подтягиваем контент из Gist при загрузке
  useEffect(() => {
    if (!GIST_RAW_URL) return;
    fetch(GIST_RAW_URL + '?t=' + Date.now())
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => setContent({...CONTENT_DEFAULT, ...data}))
      .catch(() => {});
  }, []);

  // Lenis + GSAP init
  useEffect(() => {
    gsap.registerPlugin(ScrollTrigger);

    const LenisClass = window.Lenis || (window.Lenis = window.lenis);
    if (!LenisClass) { console.warn('Lenis not loaded'); return; }
    const lenis = new LenisClass({lerp:.08, smoothWheel:true});
    window.__lenis = lenis;
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add(time => lenis.raf(time * 1000));
    gsap.ticker.lagSmoothing(0);

    setTimeout(() => ScrollTrigger.refresh(), 600);

    return () => {
      lenis.destroy();
      gsap.ticker.remove(time => lenis.raf(time * 1000));
      ScrollTrigger.getAll().forEach(st => st.kill());
    };
  }, []);

  // Smooth anchor clicks for any remaining hrefs
  useEffect(() => {
    const handler = (e) => {
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const id = a.getAttribute('href').slice(1);
      if (!id) return;
      const el = document.getElementById(id);
      if (el) {
        e.preventDefault();
        if (window.__lenis) window.__lenis.scrollTo(el, {offset:-80, duration:1.4});
        else el.scrollIntoView({behavior:'smooth'});
      }
    };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, []);

  return (
    <>
      <ScrollProgress/>
      <Nav/>
      <Ticker/>
      <Hero hero={content.hero}/>
      <StatsStrip/>
      <Features features={content.features}/>
      <Gallery slides={content.slides}/>
      <UniqueSection unique={content.unique}/>
      <Comparison compareRows={content.compareRows}/>
      <Privacy/>
      <CTA/>
      <Footer/>
      <BackToTop/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
