<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoNites Admin</title>

<!-- admin-config.js живёт в корне, admin/ — подпапка -->
<script src="../admin-config.js" onerror="window.ADMIN_CONFIG=null"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7C6FFF;--accent2:#A78BFA;--profit:#00C96B;--loss:#FF3B5C;
  --warning:#F59E0B;--bg0:#0B0D11;--bg1:#111318;--bg2:#181B22;--bg3:#1E2230;
  --text:#F0F2F5;--text2:#9CA3AF;--border:rgba(255,255,255,0.07);
  --glow:rgba(124,111,255,0.35);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg0);color:var(--text)}
#root{height:100%}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* ── Layout: left editor | right preview ── */
.adm-wrap{display:flex;flex-direction:column;height:100vh}
.adm-main{flex:1;display:flex;overflow:hidden}
.adm-editor{width:520px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border)}
.adm-editor-body{flex:1;overflow-y:auto;padding:20px}
.adm-preview{flex:1;overflow-y:auto;background:var(--bg0);position:relative}

/* ── Header ── */
.adm-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(11,13,17,0.9);backdrop-filter:blur(16px);flex-shrink:0;gap:12px}
.adm-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.adm-logo-icon{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 14px var(--glow)}
.adm-header-right{display:flex;align-items:center;gap:8px}
.adm-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.25);color:var(--accent2)}
.adm-badge-warn{border-color:rgba(245,158,11,.3);color:var(--warning);background:rgba(245,158,11,0.08)}

/* ── Tabs ── */
.adm-tabs{display:flex;gap:3px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg1);flex-shrink:0;overflow-x:auto}
.adm-tab{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.adm-tab:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.adm-tab.active{background:rgba(124,111,255,0.18);border-color:rgba(124,111,255,0.4);color:var(--accent2)}

/* ── Preview label ── */
.preview-label{position:sticky;top:0;z-index:10;padding:8px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text2);background:rgba(11,13,17,0.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);text-transform:uppercase}

/* ── Preview iframe-like container ── */
.preview-scale-wrap{padding:20px;display:flex;flex-direction:column;gap:16px}
.preview-section{background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.preview-section-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2)}

/* ── Hero preview ── */
.prev-hero{padding:24px;text-align:center}
.prev-badge-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.3);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:12px}
.prev-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--profit);flex-shrink:0}
.prev-h1{font-size:22px;font-weight:800;line-height:1.15;letter-spacing:-.02em;margin-bottom:8px}
.prev-gradient{background:linear-gradient(135deg,#fff 30%,var(--accent2) 60%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.prev-highlight{color:var(--profit);-webkit-text-fill-color:var(--profit)}
.prev-sub{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px;max-width:360px;margin-left:auto;margin-right:auto}
.prev-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.prev-btn-p{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 18px;font-size:12px;font-weight:700;cursor:default}
.prev-btn-s{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:8px 18px;font-size:12px;font-weight:600;cursor:default}

/* ── Feature preview cards ── */
.prev-feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:14px}
.prev-feat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.prev-feat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.prev-feat-title{font-size:12px;font-weight:700;margin-bottom:5px}
.prev-feat-desc{font-size:11px;color:var(--text2);line-height:1.5}
.prev-feat-badge{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px}
.badge-new{background:rgba(0,201,107,0.15);color:var(--profit)}
.badge-unique{background:rgba(124,111,255,0.15);color:var(--accent2)}
.badge-macos{background:rgba(245,158,11,0.15);color:var(--warning)}

/* ── Slide preview ── */
.prev-slides{display:flex;flex-direction:column;gap:10px;padding:14px}
.prev-slide{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.prev-slide-thumb{width:80px;height:50px;object-fit:cover;object-position:top;flex-shrink:0;background:var(--bg3)}
.prev-slide-cap{font-size:12px;padding:8px;color:var(--text2)}

/* ── Unique preview ── */
.prev-unique{display:flex;flex-direction:column;gap:10px;padding:14px}
.prev-unique-item{display:flex;gap:12px;align-items:flex-start}
.prev-unique-num{width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prev-unique-title{font-size:12px;font-weight:700;margin-bottom:3px}
.prev-unique-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* ── Compare preview ── */
.prev-compare{padding:14px;overflow-x:auto}
.prev-table{width:100%;border-collapse:collapse;font-size:11px}
.prev-table th{padding:8px 10px;text-align:left;background:var(--bg2);color:var(--text2);font-weight:700}
.prev-table th.our{color:var(--accent2)}
.prev-table td{padding:7px 10px;border-top:1px solid var(--border);color:var(--text2)}
.prev-table td:first-child{color:var(--text)}
.prev-table .our-col{background:rgba(124,111,255,0.04)}
.prev-check{color:var(--profit);font-weight:700}
.prev-cross{color:var(--loss);opacity:.5}

/* ── Editor fields ── */
.adm-inner{display:flex;flex-direction:column;gap:10px}
.adm-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px}
.adm-card-header{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.adm-card-title{flex:1;font-size:13px;font-weight:600}
.adm-chevron{color:var(--text2);font-size:10px;transition:transform .2s}
.adm-card-body{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.adm-label{display:block;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.adm-input,.adm-textarea,.adm-select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--text);outline:none;transition:border-color .2s;font-family:inherit}
.adm-input:focus,.adm-textarea:focus,.adm-select:focus{border-color:rgba(124,111,255,0.5)}
.adm-textarea{resize:vertical;line-height:1.6}
.adm-select{cursor:pointer}
.adm-icon-inp{width:44px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px;font-size:18px;color:var(--text);outline:none;text-align:center}
.adm-row{display:flex;gap:10px;align-items:flex-start}
.adm-col{flex:1}
.adm-grid4{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px}

/* ── Buttons ── */
.btn-save{background:var(--accent);border:none;color:#fff;border-radius:9px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 0 20px var(--glow);transition:all .2s}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 0 32px var(--glow)}
.btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-add{display:inline-flex;align-items:center;gap:5px;background:rgba(124,111,255,0.1);border:1px solid rgba(124,111,255,0.25);color:var(--accent2);border-radius:7px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-add:hover{background:rgba(124,111,255,0.2)}
.btn-del{background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.2);color:var(--loss);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-del:hover{background:rgba(255,59,92,0.2)}
.btn-close{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-close:hover{background:rgba(255,255,255,0.1)}

/* ── Status ── */
.adm-status{font-size:11px;padding:7px 12px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text2);margin:0 20px 10px;flex-shrink:0}
.adm-status.ok{color:var(--profit);border-color:rgba(0,201,107,0.25);background:rgba(0,201,107,0.07)}
.adm-status.err{color:var(--loss);border-color:rgba(255,59,92,0.25);background:rgba(255,59,92,0.07)}
.adm-status.info{color:var(--accent2);border-color:rgba(124,111,255,0.25);background:rgba(124,111,255,0.07)}

/* ── Login ── */
.adm-login-wrap{display:flex;align-items:center;justify-content:center;height:100%}
.adm-login-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:360px}
.adm-login-title{font-size:18px;font-weight:700;margin-bottom:5px}
.adm-login-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.adm-err{color:var(--loss);font-size:11px;margin-top:7px}

/* ── Noconfig ── */
.adm-noconfig{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;text-align:center;padding:24px}
.adm-noconfig h2{font-size:18px;font-weight:700}
.adm-noconfig p{font-size:13px;color:var(--text2);max-width:380px;line-height:1.7}
.adm-noconfig code{background:rgba(255,255,255,0.08);border-radius:5px;padding:1px 6px;font-size:12px;color:var(--accent2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="admin.js"></script>
</body>
</html>
